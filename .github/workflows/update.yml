name: Update EPG Pro
on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Run Script
        run: python3 filter_epg.py
      - name: Deploy
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add guida.xml
          git commit -m "EPG Update $(date)" || exit 0
          git push
