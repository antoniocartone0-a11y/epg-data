name: Update EPG
on:
  schedule:
    - cron: '0 0,8,16 * * *' # Scarica ogni 8 ore
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download XML
        run: curl -L "https://www.open-epg.com/files/italy3.xml" -o guida.xml

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add guida.xml
          git commit -m "Auto-update EPG" || exit 0
          git push
