name: Update EPG
on:
  schedule:
    - cron: '0 0,8,16 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download
        run: curl -L -A "Mozilla/5.0" -H "Referer: https://www.open-epg.com/" "https://www.open-epg.com/files/italy3.xml" -o temp_guida.xml
      - name: Filter
        run: python3 filter_epg.py
      - name: Push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add guida.xml
          git commit -m "update" || exit 0
          git push
